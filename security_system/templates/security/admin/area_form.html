{% extends "security/base.html" %}
{% block title %}{% if editing %}Editar{% else %}Nueva{% endif %} Área{% endblock %}
{% block page_title %}{% if editing %}Editar Área{% else %}Nueva Área{% endif %}{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nombre del Área *</label>
                <input type="text" name="name" value="{{ area.name|default:'' }}" required
                       class="w-full border border-gray-200 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 bg-gray-50"
                       placeholder="Almacén Principal">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
                <textarea name="description" rows="3"
                          class="w-full border border-gray-200 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 bg-gray-50 resize-none"
                          placeholder="Breve descripción del área...">{{ area.description|default:'' }}</textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <a href="{% url 'security:admin_areas' %}" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 rounded-xl transition-colors text-center text-sm">Cancelar</a>
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors text-sm">
                    {% if editing %}Guardar{% else %}Crear Área{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
