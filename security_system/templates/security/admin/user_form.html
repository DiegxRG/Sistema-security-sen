{% extends "security/base.html" %}
{% block title %}Nuevo Usuario{% endblock %}
{% block page_title %}Crear Nuevo Usuario{% endblock %}
{% block page_subtitle %}Crear cuenta de acceso al sistema{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nombre Completo *</label>
                <input type="text" name="displayName" required
                       class="w-full border border-gray-200 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 bg-gray-50"
                       placeholder="María García">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico *</label>
                <input type="email" name="email" required
                       class="w-full border border-gray-200 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 bg-gray-50"
                       placeholder="usuario@senati.pe">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña *</label>
                <input type="password" name="password" required minlength="6"
                       class="w-full border border-gray-200 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 bg-gray-50"
                       placeholder="Mínimo 6 caracteres">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Rol *</label>
                <select name="role" required
                        class="w-full border border-gray-200 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 bg-gray-50">
                    {% for role in all_roles %}
                    <option value="{{ role }}" {% if role == 'operator' %}selected{% endif %}>
                        {{ role }} — 
                        {% if role == 'admin' %}Acceso total
                        {% elif role == 'operator' %}Registrar entradas/salidas
                        {% elif role == 'supervisor' %}Ver dashboard y reportes
                        {% else %}Solo lectura{% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex gap-3 pt-2">
                <a href="{% url 'security:admin_users' %}" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 rounded-xl transition-colors text-center text-sm">Cancelar</a>
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors text-sm">Crear Usuario</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
