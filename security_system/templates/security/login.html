{% extends "security/base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block unauthenticated_content %}
<div class="min-h-screen bg-gradient-to-br from-senati-dark via-slate-900 to-blue-950 flex items-center justify-center p-4">
    <!-- Background pattern -->
    <div class="absolute inset-0 opacity-5">
        <div class="absolute inset-0" style="background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0); background-size: 40px 40px;"></div>
    </div>
    
    <div class="relative w-full max-w-md">
        <!-- Logo Card -->
        <div class="text-center mb-8 animate-fade-in">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl mx-auto flex items-center justify-center shadow-2xl shadow-blue-500/30 mb-4">
                <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">SENATI</h1>
            <p class="text-blue-300/70 text-sm mt-1">Sistema de Control de Seguridad</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-white/10 backdrop-blur-xl rounded-2xl border border-white/10 p-8 shadow-2xl animate-fade-in" style="animation-delay: 0.1s">
            <h2 class="text-xl font-semibold text-white mb-1">Iniciar Sesión</h2>
            <p class="text-slate-400 text-sm mb-6">Ingresa con tu cuenta de operador</p>
            
            <!-- Error message area -->
            <div id="login-error" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-300 text-sm"></div>
            
            <!-- Login Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Correo electrónico</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="email" id="email" required 
                               class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
                               placeholder="operador@senati.pe">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="password" id="password" required 
                               class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
                               placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" id="login-btn"
                        class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-semibold py-3 rounded-xl transition-all duration-200 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 flex items-center justify-center gap-2">
                    <span id="login-btn-text">Ingresar al Sistema</span>
                    <svg id="login-spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>
        </div>
        
        <!-- Footer -->
        <p class="text-center text-slate-500 text-xs mt-6">
            &copy; 2026 SENATI — Sistema de Control de Seguridad v2.0
        </p>
    </div>
</div>

<!-- Firebase Auth SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
    // Initialize Firebase
    const firebaseConfig = {{ firebase_config|safe }};
    firebase.initializeApp(firebaseConfig);
    
    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('login-error');
    const loginBtn = document.getElementById('login-btn');
    const btnText = document.getElementById('login-btn-text');
    const spinner = document.getElementById('login-spinner');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Show loading
        loginBtn.disabled = true;
        btnText.textContent = 'Verificando...';
        spinner.classList.remove('hidden');
        errorDiv.classList.add('hidden');
        
        try {
            // Sign in with Firebase Auth
            const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
            const idToken = await userCredential.user.getIdToken();
            
            // Send token to Django backend to create session
            const response = await fetch('/security/api/session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken }),
            });
            
            const data = await response.json();
            
            if (data.success) {
                btnText.textContent = '¡Bienvenido!';
                window.location.href = data.redirect || '/security/';
            } else {
                throw new Error(data.error || 'Error al crear la sesión');
            }
            
        } catch (error) {
            let message = 'Error al iniciar sesión';
            
            if (error.code === 'auth/user-not-found') {
                message = 'No existe una cuenta con ese correo.';
            } else if (error.code === 'auth/wrong-password') {
                message = 'Contraseña incorrecta.';
            } else if (error.code === 'auth/invalid-email') {
                message = 'Correo electrónico no válido.';
            } else if (error.code === 'auth/too-many-requests') {
                message = 'Demasiados intentos. Intenta más tarde.';
            } else if (error.message) {
                message = error.message;
            }
            
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            
            loginBtn.disabled = false;
            btnText.textContent = 'Ingresar al Sistema';
            spinner.classList.add('hidden');
        }
    });
</script>
{% endblock %}
